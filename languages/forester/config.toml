name = "Forester"
grammar = "forester"
path_suffixes = ["tree"]
autoclose_before = "})]"
brackets = [
  { start = "(", end = ")", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "{", end = "}", close = true, newline = true },
]
tab_size = 2
line_comments = ["% "]
